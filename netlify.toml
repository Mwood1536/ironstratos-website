[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Clean URLs for the lead-gen pages
[[redirects]]
  from = "/newsletter"
  to   = "/newsletter.html"
  status = 200

[[redirects]]
  from = "/beta"
  to   = "/beta.html"
  status = 200

[[redirects]]
  from = "/beta/thanks"
  to   = "/beta/thanks.html"
  status = 200

[[redirects]]
  from = "/demo"
  to   = "/demo.html"
  status = 200

[[redirects]]
  from = "/demo/thanks"
  to   = "/demo/thanks.html"
  status = 200

[[redirects]]
  from = "/services"
  to   = "/services.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to   = "/privacy.html"
  status = 200

# Google Play account-deletion URL — must stay public and login-free
[[redirects]]
  from = "/delete-account"
  to   = "/delete-account.html"
  status = 200

[[redirects]]
  from = "/terms"
  to   = "/terms.html"
  status = 200

[[redirects]]
  from = "/legal/subscription-agreement"
  to   = "/legal/subscription-agreement.html"
  status = 200

[[redirects]]
  from = "/legal/dpa"
  to   = "/legal/dpa.html"
  status = 200
